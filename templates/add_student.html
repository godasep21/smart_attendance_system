<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
<h2>Add Student</h2>
{% if message %}
<h3 style="color:red">{{message}}</h3>
{% endif %}
<form method="POST" action="/start" enctype="multipart/form-data">
<input name="name"
placeholder="Student Name"
value="{{name}}"
pattern="[A-Za-z ]+"
title="Only letters allowed"
required>
<input name="roll"
type="number"
placeholder="Roll No"
value="{{roll}}"
required>
<select name="class">
{% for c in classes %}
<option value="{{c}}"
{% if cls==c|string %}selected{% endif %}>
{{c}}
</option>
{% endfor %}
</select>
<button name="action" value="save">
Save Student
</button>
<br><br>
<label>Upload Student File</label>
<br>
<input type="file"
name="student_file"
accept=".csv,.xlsx,.xls,.pdf,.xml">
<br><br>
<button name="action" value="upload" formnovalidate>
Upload Students
</button>
{% if duplicate %}
<br><br>
<button name="action" value="replace">
Replace Existing Student
</button>
<a href="/start">
<button type="button">
Cancel
</button>
</a>
{% endif %}
</form>
<br>
<a href="/student_list">
<button>Student List</button>
</a>
<a href="/student_history">
<button>Student History</button>
</a>
<a href="/">
<button>Back</button>
</a>
</div>
{% if duplicate_names %}
<script>
let confirmReplace = confirm(
"These students already exist:\n\n{{ duplicate_names|join('\n') }}\n\nDo you want to replace them?"
);
if(confirmReplace){
    let form = document.forms[0];
    let input = document.createElement("input");
    input.type="hidden";
    input.name="confirm_replace";
    input.value="yes";
    form.appendChild(input);
    form.submit();
}
</script>
{% endif %}
</body>
</html>
