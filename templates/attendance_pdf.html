<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
<title>Attendance PDF</title>
<style>
.form-box{
text-align:center;
margin-top:40px;
}
select,input{
padding:10px;
margin:10px;
}
</style>
</head>
<body class="bg-image">
<div class="container">
<h2 style="text-align:center">Download Attendance PDF</h2>
<div class="form-box">
<form method="POST" action="/download_pdf">
<select name="class" required>
<option value="">Select Class</option>
{% for c in range(5,13) %}
<option value="{{c}}">Class {{c}}</option>
{% endfor %}
</select>
<br>
<input type="date" name="date" required>
<br>
<button type="submit">
Download PDF
</button>
</form>
<br>
<a href="/">
<button>
Back
</button>
</a>
</div>
</div>
</body>
</html>
